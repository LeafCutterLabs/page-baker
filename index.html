<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page-Baker | Notebook Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    #designStage { cursor: crosshair; touch-action: none; }
    .grid-layer { pointer-events: none; transition: opacity 0.2s ease; }
    
    /* Selection & Hover Styles */
    .element-hover { cursor: pointer; transition: stroke 0.2s; stroke-linecap: round; stroke-linejoin: round; }
    .element-hover:hover { stroke: #6366f1; stroke-width: 2px; }
    .element-selected { stroke: #6366f1 !important; stroke-width: 2.5px !important; filter: drop-shadow(0 0 4px rgba(99, 102, 241, 0.4)); }
    
    /* Invisible Hit Area */
    .hit-target { cursor: pointer; fill: transparent; stroke: transparent; stroke-width: 16px; pointer-events: all; stroke-linecap: round; }
    
    .handle { cursor: move; fill: #6366f1; stroke: white; stroke-width: 1.5; transition: r 0.2s; pointer-events: all; }
    .handle:hover { r: 6; }
    
    /* Text Box Styling */
    .text-box-container { 
      pointer-events: auto; 
      overflow: visible; 
      display: flex;
      height: 100%;
      background: rgba(165, 180, 252, 0.15); /* Persistent light purple background */
      border: 1px solid rgba(99, 102, 241, 0.1);
      position: relative;
      box-sizing: border-box;
    }
    .text-box-content {
      font-family: 'Helvetica', sans-serif;
      line-height: 1.1;
      color: #334155;
      word-break: break-word;
      width: 100%;
      outline: none;
      padding: 2px 4px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      white-space: pre-wrap;
    }
    .text-box-content[contenteditable="true"] {
      background: rgba(255, 255, 255, 0.6);
      cursor: text;
    }
    
    /* Ruler Styles */
    .ruler { background: #fff; color: #94a3b8; font-family: monospace; font-size: 9px; font-weight: bold; pointer-events: none; border-color: #e2e8f0; }
    .ruler-tick { stroke: #cbd5e1; stroke-width: 1; stroke-linecap: round; }
    .ruler-label { fill: #94a3b8; }
    .ruler-center-marker { stroke: #6366f1; stroke-width: 1.5; }

    #rulerLayout { transform-origin: top center; transition: transform 0.2s ease-out; }
    
    input[type="range"] { accent-color: #6366f1; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    #marqueeBox { fill: rgba(99, 102, 241, 0.1); stroke: #6366f1; stroke-width: 1; stroke-dasharray: 4; pointer-events: none; stroke-linecap: round; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden font-sans">
  <div class="h-full flex flex-col" id="app">
    <header class="border-b bg-white px-6 py-3 shadow-sm flex items-center justify-between z-20">
      <div class="flex items-center gap-4">
        <div class="flex flex-col">
          <h1 class="text-xl font-bold tracking-tight text-indigo-900 leading-none">Page-Baker</h1>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Professional Studio</span>
        </div>
        
        <div class="h-8 w-px bg-slate-200 mx-2"></div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
          <button onclick="setPaper('letter')" id="btn-letter" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all">Letter</button>
          <button onclick="setPaper('legal')" id="btn-legal" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all">Legal</button>
          <button onclick="setPaper('a4')" id="btn-a4" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all">A4</button>
          <button onclick="setPaper('b5')" id="btn-b5" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all">Semi-B5</button>
        </div>

        <div class="flex items-center gap-2 ml-2">
          <span class="text-[10px] font-bold text-slate-400 uppercase">Grid:</span>
          <select id="gridSelect" onchange="updateGridSize(this.value)" class="text-xs font-bold bg-white border border-slate-200 rounded px-2 py-1 outline-none focus:ring-2 ring-indigo-100">
            <optgroup label="Notebook Presets">
              <option value="3mm">3mm (Task)</option>
              <option value="5mm">5mm (Std)</option>
              <option value="6mm">6mm (B-Ruled)</option>
              <option value="12mm">12mm (Kanji)</option>
            </optgroup>
            <optgroup label="Imperial Standards">
              <option value="0.25" selected>1/4" Grid</option>
              <option value="0.281">College</option>
              <option value="0.344">Wide</option>
            </optgroup>
          </select>
        </div>

        <div class="flex items-center gap-3 border-l pl-3 border-slate-200">
          <div class="flex flex-col items-start gap-0.5">
            <div class="flex items-center gap-1">
              <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Opacity %</span>
              <input type="number" id="globalOpacityInput" min="0" max="100" value="100" onchange="updateGlobalOpacity(this.value)" class="w-7 text-[10px] font-bold text-indigo-600 bg-slate-50 rounded px-1 border-none focus:ring-1 ring-indigo-300 text-center">
            </div>
            <input type="range" id="globalOpacitySlider" min="0" max="100" step="1" value="100" oninput="updateGlobalOpacity(this.value)" class="w-20 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <button onclick="toggleGrid()" id="gridToggle" class="p-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors" title="Toggle Grid"><i data-lucide="grid" class="w-4 h-4"></i></button>
          <button onclick="toggleRulers()" id="rulerToggle" class="p-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors" title="Toggle Rulers"><i data-lucide="ruler" class="w-4 h-4"></i></button>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <button onclick="undo()" id="undoBtn" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-30 transition-colors" disabled>
          <i data-lucide="undo" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Undo</span>
        </button>
        <button onclick="clearCanvas()" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-rose-600 bg-white border border-rose-100 rounded-lg hover:bg-rose-50 transition-colors" title="Clear All"><i data-lucide="refresh-cw" class="w-4 h-4"></i><span class="hidden sm:inline">Reset</span></button>
        <div class="h-8 w-px bg-slate-200 mx-1"></div>
        <button onclick="downloadSVG()" class="px-4 py-2 text-sm font-bold text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-all flex items-center gap-2">
          <i data-lucide="download" class="w-4 h-4"></i>
          <span>Bake SVG</span>
        </button>
        <button onclick="downloadPDF()" class="px-5 py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-md transition-all flex items-center gap-2">
          <i data-lucide="file-down" class="w-4 h-4"></i>
          <span>Bake PDF</span>
        </button>
      </div>
    </header>

    <div class="bg-slate-50 border-b px-6 py-2 flex items-center justify-center gap-6 z-10">
      <div class="flex items-center gap-2">
        <button onclick="prevPage()" class="p-1.5 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all text-slate-600"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
        <div class="bg-white px-4 py-1 rounded-full border border-slate-200 shadow-sm">
          <span class="text-xs font-bold text-slate-600 uppercase tracking-widest">Page <span id="currentPageDisplay">1</span> of <span id="totalPagesDisplay">1</span></span>
        </div>
        <button onclick="nextPage()" class="p-1.5 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 transition-all text-slate-600"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
      </div>
      <div class="h-4 w-px bg-slate-300"></div>
      <div class="flex items-center gap-2">
        <button onclick="addPage()" class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-50 text-indigo-600 text-xs font-bold rounded-lg border border-indigo-100 hover:bg-indigo-100 transition-all"><i data-lucide="file-plus-2" class="w-4 h-4"></i><span>Add Page</span></button>
        <button onclick="deletePage()" id="deletePageBtn" class="flex items-center gap-1.5 px-3 py-1.5 bg-rose-50 text-rose-600 text-xs font-bold rounded-lg border border-rose-100 hover:bg-rose-100 transition-all"><i data-lucide="file-minus-2" class="w-4 h-4"></i><span>Delete Page</span></button>
      </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
      <!-- Toolbox Sidebar -->
      <aside class="w-16 border-r bg-white flex flex-col items-center py-6 gap-4 z-10 shadow-sm">
        <button onclick="setTool('select')" id="tool-select" class="tool-btn p-3 rounded-xl text-slate-400 active-tool" title="Select / Move / Edit"><i data-lucide="mouse-pointer-2" class="w-6 h-6"></i></button>
        <div class="w-8 h-px bg-slate-100 my-2"></div>
        <button onclick="setTool('line')" id="tool-line" class="tool-btn p-3 rounded-xl text-slate-400" title="Line (Sel + H/V to Span)"><i data-lucide="minus" class="w-6 h-6"></i></button>
        <button onclick="setTool('rect')" id="tool-rect" class="tool-btn p-3 rounded-xl text-slate-400" title="Box"><i data-lucide="square" class="w-6 h-6"></i></button>
        <button onclick="setTool('dot')" id="tool-dot" class="tool-btn p-3 rounded-xl text-slate-400" title="Dot (Shift+Drag to Fill Area)"><i data-lucide="dot" class="w-6 h-6"></i></button>
        <button onclick="setTool('cross')" id="tool-cross" class="tool-btn p-3 rounded-xl text-slate-400" title="Cross (Dbl Click, Shift+Drag to Fill Area)"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button onclick="setTool('label')" id="tool-label" class="tool-btn p-3 rounded-xl text-slate-400" title="Grid Text Box (Drag 1/2 Snapped Area)"><i data-lucide="type" class="w-6 h-6"></i></button>
      </aside>

      <section id="viewport" class="flex-1 overflow-auto bg-slate-200/50 flex flex-col items-center p-12 no-scrollbar relative">
        <div id="rulerLayout" class="relative flex flex-col shadow-[0_30px_60px_rgba(0,0,0,0.15)] bg-white border border-slate-200">
          <div class="flex">
            <div id="rulerCorner" class="w-8 h-8 bg-white border-b border-r border-slate-200 flex-shrink-0"></div>
            <svg id="rulerTop" class="ruler h-8 border-b border-slate-200 flex-grow"></svg>
          </div>
          <div class="flex">
            <svg id="rulerLeft" class="ruler w-8 border-r border-slate-200 flex-shrink-0"></svg>
            <div id="canvasWrapper" class="bg-white relative flex-shrink-0">
              <svg id="gridOverlay" class="absolute inset-0 grid-layer w-full h-full"></svg>
              <svg id="designStage" class="absolute inset-0 w-full h-full">
                <g id="elementsGroup"></g>
                <g id="handlesGroup"></g>
                <circle id="snapDot" r="3" fill="#6366f1" class="opacity-0 pointer-events-none" />
                <line id="tempLine" class="hidden" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4" stroke-linecap="round" />
                <rect id="tempRect" class="hidden" fill="rgba(99, 102, 241, 0.1)" stroke="#6366f1" stroke-width="1" stroke-dasharray="4" stroke-linecap="round" />
                <rect id="marqueeBox" class="hidden" />
              </svg>
            </div>
          </div>
        </div>

        <div id="propsPanel" class="hidden fixed top-24 right-8 bg-white border border-slate-200 p-5 rounded-2xl shadow-xl w-64 z-30">
          <div class="flex items-center justify-between mb-4 border-b pb-2">
            <span id="propsTitle" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Properties</span>
            <button onclick="deleteSelected()" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
          <div class="space-y-5">
            <div>
              <label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Pattern</label>
              <div class="grid grid-cols-4 gap-1 bg-slate-100 p-1 rounded-lg">
                <button onclick="updateSelectedStyle('dash', 'none')" id="style-none" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Solid</button>
                <button onclick="updateSelectedStyle('dash', '5,5')" id="style-dashed" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Dash</button>
                <button onclick="updateSelectedStyle('dash', '0,4')" id="style-dotted" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Dot</button>
                <button onclick="updateSelectedStyle('dash', '8,4,0,4')" id="style-dashdot" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">D-Dot</button>
              </div>
            </div>
            <div id="typeSpecificProps"></div>
            <div class="grid grid-cols-2 gap-4">
               <div>
                  <div class="flex items-center justify-between mb-1"><label class="text-[9px] font-bold text-slate-400 uppercase">Weight</label><span id="weightVal" class="text-[10px] font-bold text-indigo-600">1px</span></div>
                  <input type="range" min="0.5" max="5" step="0.5" value="1" id="weightSlider" oninput="updateSelectedStyle('weight', this.value)" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
               </div>
               <div>
                  <div class="flex items-center justify-between mb-1"><label class="text-[9px] font-bold text-slate-400 uppercase">Opacity</label><span id="opacityVal" class="text-[10px] font-bold text-indigo-600">100%</span></div>
                  <input type="range" min="10" max="100" step="10" value="100" id="opacitySlider" oninput="updateSelectedStyle('opacity', this.value)" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
               </div>
            </div>
          </div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur border border-slate-200 px-3 py-2 rounded-2xl shadow-xl flex items-center gap-2 z-30">
           <button onclick="zoomOut()" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors"><i data-lucide="minus-circle" class="w-5 h-5"></i></button>
           <span id="zoomLabel" class="text-xs font-bold text-slate-500 w-12 text-center">100%</span>
           <button onclick="zoomIn()" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
           <div class="h-5 w-px bg-slate-200 mx-1"></div>
           <button onclick="fitAuto()" class="px-2 py-1 text-[10px] font-bold bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded transition-all uppercase tracking-tighter">Auto Fit</button>
        </div>

        <div class="fixed bottom-6 right-6 bg-white border border-slate-200 px-4 py-2 rounded-full shadow-lg text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-6 pointer-events-none z-30">
          <span id="coordDisplay">X: 0.00 Y: 0.00</span>
          <span id="countDisplay">0 Elements</span>
        </div>
      </section>
    </div>
  </div>

  <script>
    const PAPER_CONFIG = {
      letter: { width: 8.5, height: 11, unit: 'in' },
      legal: { width: 8.5, height: 14, unit: 'in' },
      a4: { width: 210, height: 297, unit: 'mm' },
      b5: { width: 179, height: 252, unit: 'mm' }
    };

    const PPI = 72; const PMM = 2.83465;

    let state = {
      paper: 'letter', gridSize: 18, unit: 'in', tool: 'select', 
      pages: [{ elements: [] }], currentPageIndex: 0,
      history: [], zoom: 1.0, globalOpacity: 100,
      isDrawing: false, isDragging: false, isModifying: false, isFilling: false, isSelecting: false,
      activeKeys: {}, clipboard: [], editingIndex: null,
      startPoint: null, dragElementIndex: null, selectedIndices: [], modifyHandleType: null,
      gridVisible: true, rulerVisible: true, gridOffset: { x: 0, y: 0 },
      gridType: 'standard', currentGridMode: 'in'
    };

    const canvasWrapper = document.getElementById('canvasWrapper');
    const gridOverlay = document.getElementById('gridOverlay');
    const designStage = document.getElementById('designStage');
    const elementsGroup = document.getElementById('elementsGroup');
    const handlesGroup = document.getElementById('handlesGroup');
    const tempLine = document.getElementById('tempLine');
    const tempRect = document.getElementById('tempRect');
    const marqueeBox = document.getElementById('marqueeBox');
    const snapDot = document.getElementById('snapDot');
    const coordDisplay = document.getElementById('coordDisplay');
    const countDisplay = document.getElementById('countDisplay');
    const undoBtn = document.getElementById('undoBtn');
    const rulerTop = document.getElementById('rulerTop');
    const rulerLeft = document.getElementById('rulerLeft');
    const propsPanel = document.getElementById('propsPanel');
    const propsTitle = document.getElementById('propsTitle');
    const rulerLayout = document.getElementById('rulerLayout');
    const viewport = document.getElementById('viewport');
    const typeSpecificProps = document.getElementById('typeSpecificProps');

    function init() {
      lucide.createIcons();
      setPaper('letter');
      setupEventListeners();
      updateGridSize('0.25');
      setTimeout(fitAuto, 300);
      updatePageIndicators();
    }

    function setPaper(type) {
      if (state.pages.some(p => p.elements.length > 0)) saveHistory();
      state.paper = type; state.unit = PAPER_CONFIG[type].unit;
      const config = PAPER_CONFIG[type];
      const w = state.unit === 'in' ? config.width * PPI : config.width * PMM;
      const h = state.unit === 'in' ? config.height * PPI : config.height * PMM;
      canvasWrapper.style.width = `${w}px`; canvasWrapper.style.height = `${h}px`;
      rulerTop.style.width = `${w}px`; rulerLeft.style.height = `${h}px`;
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.toggle('bg-indigo-600', b.id === `btn-${type}`));
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.toggle('text-white', b.id === `btn-${type}`));
      renderGrid(); renderElements();
    }

    function addPage() { saveHistory(); state.pages.push({ elements: [] }); state.currentPageIndex = state.pages.length - 1; state.selectedIndices = []; renderElements(); updatePageIndicators(); }
    function deletePage() { if (state.pages.length <= 1) return; saveHistory(); state.pages.splice(state.currentPageIndex, 1); state.currentPageIndex = Math.max(0, state.currentPageIndex - 1); state.selectedIndices = []; renderElements(); updatePageIndicators(); }
    function prevPage() { if (state.currentPageIndex > 0) { state.currentPageIndex--; state.selectedIndices = []; renderElements(); updatePageIndicators(); } }
    function nextPage() { if (state.currentPageIndex < state.pages.length - 1) { state.currentPageIndex++; state.selectedIndices = []; renderElements(); updatePageIndicators(); } }
    function updatePageIndicators() { document.getElementById('currentPageDisplay').innerText = state.currentPageIndex + 1; document.getElementById('totalPagesDisplay').innerText = state.pages.length; document.getElementById('deletePageBtn').disabled = state.pages.length <= 1; }

    function updateZoom(newZoom) {
      state.zoom = Math.max(0.1, Math.min(3, newZoom));
      rulerLayout.style.transform = `scale(${state.zoom})`;
      document.getElementById('zoomLabel').innerText = `${Math.round(state.zoom * 100)}%`;
    }

    function zoomIn() { updateZoom(state.zoom + 0.1); }
    function zoomOut() { updateZoom(state.zoom - 0.1); }
    function fitAuto() {
      const avW = viewport.clientWidth - 100, avH = viewport.clientHeight - 100;
      const paW = parseFloat(canvasWrapper.style.width) + 32, paH = parseFloat(canvasWrapper.style.height) + 32;
      updateZoom(Math.min(avW / paW, avH / paH));
    }

    function updateGridSize(val) {
      state.gridType = val === '12mm' ? 'kanji' : (val === '5mm' || val === '3mm' ? 'major' : 'standard');
      state.gridSize = val.endsWith('mm') ? parseFloat(val) * PMM : parseFloat(val) * PPI;
      renderGrid();
    }

    function toggleGrid() { state.gridVisible = !state.gridVisible; gridOverlay.style.opacity = state.gridVisible ? "1" : "0"; }
    function toggleRulers() { state.rulerVisible = !state.rulerVisible; document.querySelectorAll('.ruler, #rulerCorner').forEach(el => el.classList.toggle('hidden', !state.rulerVisible)); }

    function updateGlobalOpacity(val) { 
      const num = Math.max(0, Math.min(100, parseInt(val) || 0));
      state.globalOpacity = num; 
      document.getElementById('globalOpacitySlider').value = num;
      document.getElementById('globalOpacityInput').value = num;
      renderElements(); 
    }

    function renderGrid() {
      gridOverlay.innerHTML = '';
      const w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height), step = state.gridSize;
      state.gridOffset = { x: (w / 2) % step, y: (h / 2) % step };
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      for (let x = state.gridOffset.x; x <= w + 0.1; x += step) g.appendChild(createGridLine(x, 0, x, h, x, null));
      for (let y = state.gridOffset.y; y <= h + 0.1; y += step) g.appendChild(createGridLine(0, y, w, y, null, y));
      gridOverlay.appendChild(g);
      renderRulers(w, h);
    }

    function createGridLine(x1, y1, x2, y2, xVal, yVal) {
      const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
      const w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height);
      let isMajor = (xVal !== null && Math.abs(xVal - w/2) < 0.1) || (yVal !== null && Math.abs(yVal - h/2) < 0.1);
      if (!isMajor && state.gridType === 'major') {
          const count = xVal !== null ? Math.round((xVal - state.gridOffset.x)/state.gridSize) : Math.round((yVal - state.gridOffset.y)/state.gridSize);
          if (count % (state.gridSize < 10 ? 5 : 2) === 0) isMajor = true;
      }
      l.setAttribute("stroke", isMajor ? "#cbd5e1" : "#f1f5f9");
      l.setAttribute("stroke-width", isMajor ? "1.2" : "1");
      return l;
    }

    function renderRulers(w, h) {
      rulerTop.innerHTML = ''; rulerLeft.innerHTML = '';
      const unitScale = state.unit === 'in' ? PPI : PMM, cx = w/2, cy = h/2;
      if (state.unit === 'mm') {
        for (let x = 0; x <= w + 0.1; x += unitScale) {
          const rel = Math.round((x - cx) / unitScale);
          if (rel % 5 === 0) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x); line.setAttribute("x2", x); line.setAttribute("y1", rel % 10 === 0 ? 15 : 22); line.setAttribute("y2", 32);

          typeSpecificProps.innerHTML = `<label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Cross Size</label><div class="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg"><button onclick="updateSelectedStyle('crossSize', 4)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==4?'bg-white shadow-sm':''}">S</button><button onclick="updateSelectedStyle('crossSize', 8)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==8?'bg-white shadow-sm':''}">M</button><button onclick="updateSelectedStyle('crossSize', 14)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==14?'bg-white shadow-sm':''}">L</button></div>`;
        } else if (el.type === 'label') {
          typeSpecificProps.innerHTML = `<label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Horizontal Align</label><div class="grid grid-cols-4 gap-1 bg-slate-100 p-1 rounded-lg mb-4"><button onclick="updateHAlign(${state.selectedIndices[0]}, 'left')" class="p-1.5 rounded ${el.style.align==='left'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-left" class="w-3.5 h-3.5 mx-auto"></i></button><button onclick="updateHAlign(${state.selectedIndices[0]}, 'center')" class="p-1.5 rounded ${el.style.align==='center'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-center" class="w-3.5 h-3.5 mx-auto"></i></button><button onclick="updateHAlign(${state.selectedIndices[0]}, 'right')" class="p-1.5 rounded ${el.style.align==='right'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-right" class="w-3.5 h-3.5 mx-auto"></i></button><button onclick="updateHAlign(${state.selectedIndices[0]}, 'justify')" class="p-1.5 rounded ${el.style.align==='justify'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-justify" class="w-3.5 h-3.5 mx-auto"></i></button></div><label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Vertical Align</label><div class="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg"><button onclick="updateVAlign(${state.selectedIndices[0]}, 'top')" class="p-1.5 rounded ${el.style.vAlign==='top'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-vertical-justify-start" class="w-3.5 h-3.5 mx-auto"></i></button><button onclick="updateVAlign(${state.selectedIndices[0]}, 'middle')" class="p-1.5 rounded ${el.style.vAlign==='middle'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-vertical-justify-center" class="w-3.5 h-3.5 mx-auto"></i></button><button onclick="updateVAlign(${state.selectedIndices[0]}, 'bottom')" class="p-1.5 rounded ${el.style.vAlign==='bottom'?'bg-white text-indigo-600 shadow-sm':''}"><i data-lucide="align-vertical-justify-end" class="w-3.5 h-3.5 mx-auto"></i></button></div>`;
          setTimeout(() => lucide.createIcons(), 0);
        }
      }
    }

    function updateSelectedStyle(p, v) { if (state.selectedIndices.length === 0) return; state.selectedIndices.forEach(idx => state.pages[state.currentPageIndex].elements[idx].style[p] = v); if (p==='opacity') document.getElementById('opacityVal').innerText = `${v}%`; if (p==='weight') document.getElementById('weightVal').innerText = `${v}px`; renderElements(); updatePropsPanel(); }
    function deleteSelected() { if (state.selectedIndices.length === 0) return; saveHistory(); state.pages[state.currentPageIndex].elements = state.pages[state.currentPageIndex].elements.filter((_, i) => !state.selectedIndices.includes(i)); state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); }
    function clearCanvas() { if (confirm('Reset page?')) { saveHistory(); state.pages[state.currentPageIndex].elements = []; state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); } }
    function saveHistory() { state.history.push(JSON.stringify(state.pages)); if (state.history.length > 50) state.history.shift(); }
    function undo() { if (state.history.length) { state.pages = JSON.parse(state.history.pop()); state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); updatePageIndicators(); } }

    function downloadSVG() {
      const conf = PAPER_CONFIG[state.paper], w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height), mOp = state.globalOpacity / 100;
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${conf.width}${conf.unit}" height="${conf.height}${conf.unit}" viewBox="0 0 ${w} ${h}">`;
      svg += `<rect width="100%" height="100%" fill="white"/>`;
      state.pages[state.currentPageIndex].elements.forEach(el => {
        const op = ((el.style?.opacity || 100) / 100) * mOp, dash = el.style?.dash === 'none' ? '' : el.style?.dash, wt = el.style?.weight || 1, col = "#334155";
        if (el.type==='line') svg += `<line x1="${el.x1}" y1="${el.y1}" x2="${el.x2}" y2="${el.y2}" stroke="${col}" stroke-width="${wt}" stroke-dasharray="${dash}" opacity="${op}" stroke-linecap="round"/>`;
        else if (el.type==='rect') svg += `<rect x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" stroke="${col}" stroke-width="${wt}" stroke-dasharray="${dash}" fill="none" opacity="${op}" stroke-linecap="round"/>`;
        else if (el.type==='dot') svg += `<circle cx="${el.x}" cy="${el.y}" r="1.5" fill="${col}" opacity="${op}"/>`;
        else if (el.type==='cross') { const s = el.style.crossSize || 6; svg += `<g stroke="${col}" stroke-width="${wt}" opacity="${op}" stroke-linecap="round"><line x1="${el.x-s/2}" y1="${el.y}" x2="${el.x+s/2}" y2="${el.y}"/><line x1="${el.x}" y1="${el.y-s/2}" x2="${el.x}" y2="${el.y+s/2}"/></g>`; }
        else if (el.type==='label') {
           const lines = el.text.split('\n'), fs = Math.max(8, state.gridSize * 0.8), align = el.style.align === 'center' ? 'middle' : (el.style.align === 'right' ? 'end' : 'start');
           const xP = el.x + (el.style.align === 'center' ? el.w/2 : (el.style.align === 'right' ? el.w : 0));
           const sY = el.y + (el.style.vAlign === 'middle' ? (el.h - (lines.length * fs)) / 2 : (el.style.vAlign === 'bottom' ? el.h - (lines.length * fs) : 0));
           lines.forEach((l, li) => { svg += `<text x="${xP}" y="${sY + (li * fs) + fs}" fill="${col}" font-size="${fs}" font-family="Helvetica" font-weight="bold" text-anchor="${align}" opacity="${op}">${l}</text>`; });
        }
      });
      svg += `</svg>`;
      const b = new Blob([svg], {type: 'image/svg+xml'}), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = `baked-page-${state.currentPageIndex+1}.svg`; a.click(); URL.revokeObjectURL(u);
    }

    async function downloadPDF() {
      const { jsPDF } = window.jspdf; const conf = PAPER_CONFIG[state.paper], pdf = new jsPDF({ orientation: conf.width > conf.height ? 'l' : 'p', unit: state.unit, format: state.paper });
      const scale = state.unit === 'in' ? PPI : PMM, gOp = state.globalOpacity / 100;
      state.pages.forEach((page, pI) => {
        if (pI > 0) pdf.addPage(state.paper, conf.width > conf.height ? 'l' : 'p');
        pdf.setLineCap('round');
        page.elements.forEach(el => {
            const finalOp = ((el.style?.opacity || 100) / 100) * gOp;
            const gState = new pdf.GState({ opacity: finalOp, "stroke-opacity": finalOp });
            pdf.setGState(gState);
            pdf.setDrawColor(51, 65, 85); pdf.setLineWidth((el.style?.weight || 1) / scale);
            if (el.style?.dash !== 'none') { const d = {'5,5':[5,5], '0,4':[0,4], '8,4,0,4':[8,4,0,4]}[el.style.dash]; pdf.setLineDashPattern(d.map(v => v/scale), 0); } else pdf.setLineDashPattern([], 0);
            if (el.type === 'line') pdf.line(el.x1/scale, el.y1/scale, el.x2/scale, el.y2/scale);
            if (el.type === 'rect') pdf.rect(el.x/scale, el.y/scale, el.w/scale, el.h/scale);
            if (el.type === 'dot') { pdf.setFillColor(51, 65, 85); pdf.circle(el.x/scale, el.y/scale, 1.5/scale, 'F'); }
            if (el.type === 'cross') { const s = el.style.crossSize || 6; pdf.line((el.x-s/2)/scale, el.y/scale, (el.x+s/2)/scale, el.y/scale); pdf.line(el.x/scale, (el.y-s/2)/scale, el.x/scale, (el.y+s/2)/scale); }
            if (el.type === 'label') { 
              const fs = Math.max(7, state.gridSize * 0.8); pdf.setFont("helvetica", "bold"); pdf.setFontSize(fs * (72/96));
              const xO = el.style.align==='center'?el.w/2:(el.style.align==='right'?el.w:0), yO = el.style.vAlign==='middle'?el.h/2:(el.style.vAlign==='bottom'?el.h:10);
              pdf.text(el.text, (el.x + xO)/scale, (el.y + yO)/scale, { align: el.style.align==='justify'?'left':el.style.align, baseline: el.style.vAlign==='top'?'top':(el.style.vAlign==='bottom'?'bottom':'middle'), maxWidth: el.w/scale }); 
            }
        });
      });
      pdf.save(`baked-notebook.pdf`);
    }
    init();
  </script>
