<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page-Baker | Notebook Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./version.js"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden font-sans">
  <div class="h-full flex flex-col" id="app">
    <header class="border-b bg-white px-6 py-2 shadow-sm flex items-center justify-between z-20">
      <div class="flex items-center gap-4">
        <div class="flex flex-col">
          <h1 class="text-xl font-bold tracking-tight theme-accent-text leading-none italic">PAGE-BAKER</h1>
        </div>
        
        <div class="h-8 w-px bg-slate-200 mx-2"></div>
        
        <div class="flex items-center gap-2">
          <select id="paperSelect" onchange="window.setPaper(this.value)" class="header-select text-xs font-black bg-slate-100 border border-slate-200 rounded-md px-3 py-2 outline-none focus:ring-2 theme-accent-ring uppercase">
            <option value="letter">Letter (8.5x11")</option>
            <option value="legal">Legal (8.5x14")</option>
            <option value="ledger">Ledger (11x17")</option>
            <option value="a4">A4 (210x297mm)</option>
            <option value="b5">Semi-B5 (176x250mm)</option>
          </select>

          <button onclick="window.toggleOrientation()" id="orientationToggle" class="flex items-center gap-2 text-xs font-black bg-slate-100 border border-slate-200 rounded-md px-3 py-2 text-slate-700 hover:bg-slate-200 transition-colors uppercase" title="Toggle Portrait / Landscape">
            <i data-lucide="rotate-cw" class="w-4 h-4 theme-accent-text"></i>
            <span id="orientationLabel">Portrait</span>
          </button>

          <select id="gridSelect" onchange="window.updateGridSize(this.value)" class="header-select text-xs font-black bg-slate-100 border border-slate-200 rounded-md px-3 py-2 outline-none focus:ring-2 theme-accent-ring uppercase">
            <optgroup label="Imperial">
              <option value="0.25" selected>1/4"</option>
              <option value="0.2">0.2" (200mil)</option>
              <option value="0.28125">College (9/32")</option>
              <option value="0.34375">Wide (11/32")</option>
            </optgroup>
            <optgroup label="Metric">
              <option value="4mm">4mm</option>
              <option value="5mm">5mm</option>
              <option value="6mm">6mm</option>
            </optgroup>
          </select>
        </div>

        <div class="h-8 w-px bg-slate-200 mx-2"></div>

        <!-- Inline Multi-Page Controls -->
        <div class="flex items-center gap-1 bg-slate-50 p-1 rounded-lg border border-slate-100">
          <button onclick="window.prevPage()" class="p-1.5 hover:bg-white rounded-md transition-all text-slate-600"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
          <div class="px-2 text-[10px] font-black text-slate-500 uppercase tracking-tighter whitespace-nowrap text-center min-w-[40px]">
            <span id="currentPageDisplay">1</span> / <span id="totalPagesDisplay">1</span>
          </div>
          <button onclick="window.nextPage()" class="p-1.5 hover:bg-white rounded-md transition-all text-slate-600"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
          <div class="w-px h-4 bg-slate-200 mx-1"></div>
          <button onclick="window.addPage()" class="p-1.5 theme-accent-text hover:bg-white rounded-md transition-all" title="Add Page"><i data-lucide="file-plus-2" class="w-4 h-4"></i></button>
          <button onclick="window.copyPage()" class="p-1.5 theme-accent-text hover:bg-white rounded-md transition-all" title="Copy Page"><i data-lucide="copy" class="w-4 h-4"></i></button>
          <button onclick="window.deletePage()" id="deletePageBtn" class="p-1.5 theme-destructive hover:bg-white rounded-md transition-all" title="Delete Page"><i data-lucide="file-minus-2" class="w-4 h-4"></i></button>
          <div class="w-px h-4 bg-slate-200 mx-1"></div>
          <button onclick="window.toggleNotebookView()" id="viewToggle" class="p-1.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-md transition-all" title="Notebook View"><i data-lucide="layout-grid" class="w-4 h-4"></i></button>
          <button onclick="window.toggleGrid()" id="gridToggle" class="p-1.5 text-white theme-accent theme-accent-hover rounded-md transition-colors shadow-sm" title="Toggle Grid"><i data-lucide="grid" class="w-4 h-4"></i></button>
          <button onclick="window.toggleRulers()" id="rulerToggle" class="p-1.5 text-white theme-accent theme-accent-hover rounded-md transition-colors shadow-sm" title="Toggle Rulers"><i data-lucide="ruler" class="w-4 h-4"></i></button>
          <button onclick="window.toggleBleed()" id="bleedToggle" class="p-1.5 text-white theme-accent theme-accent-hover rounded-md transition-colors shadow-sm" title="Toggle Bleed"><i data-lucide="droplets" class="w-4 h-4"></i></button>
          <button onclick="window.toggleCenterGuide()" id="centerGuideToggle" class="p-1.5 text-white theme-accent theme-accent-hover rounded-md transition-colors shadow-sm" title="Toggle Centerline Highlight"><i data-lucide="crosshair" class="w-4 h-4"></i></button>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <div id="versionBadge" class="version-badge flex items-center px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-500 whitespace-nowrap select-text cursor-text shrink-0" title="Loaded build version" aria-label="Loaded build version">
          <span id="versionBadgeText">unknown</span>
        </div>
        <div id="coordDisplay" class="coord-hud hidden sm:flex items-center px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 whitespace-nowrap">
          X: 0.00 in Y: 0.00 in
        </div>
        <div id="selectionToolbar" class="selection-toolbar hidden flex items-center self-stretch gap-2 mr-2 px-2 py-0.5 bg-slate-50 border border-slate-200 rounded-xl min-h-0">
          <span id="selectionToolbarTitle" class="text-[9px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Properties</span>
          <div id="strokeStyleControls" class="grid grid-cols-4 gap-1 bg-white p-0.5 rounded-lg border border-slate-200">
            <button onclick="window.updateSelectedStyle('dash', 'none')" id="style-none" class="style-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Solid">
              <svg viewBox="0 0 20 8" class="pattern-icon" aria-hidden="true"><line x1="1" y1="4" x2="19" y2="4" stroke="#2F241C" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button onclick="window.updateSelectedStyle('dash', '5,5')" id="style-dashed" class="style-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Dash">
              <svg viewBox="0 0 20 8" class="pattern-icon" aria-hidden="true"><line x1="1" y1="4" x2="19" y2="4" stroke="#2F241C" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="5 4"/></svg>
            </button>
            <button onclick="window.updateSelectedStyle('dash', '0,4')" id="style-dotted" class="style-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Dot">
              <svg viewBox="0 0 20 8" class="pattern-icon" aria-hidden="true"><line x1="1" y1="4" x2="19" y2="4" stroke="#2F241C" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="0.001 4"/></svg>
            </button>
            <button onclick="window.updateSelectedStyle('dash', '8,4,0,4')" id="style-dashdot" class="style-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Dash Dot">
              <svg viewBox="0 0 20 8" class="pattern-icon" aria-hidden="true"><line x1="1" y1="4" x2="19" y2="4" stroke="#2F241C" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="8 3 0.001 3"/></svg>
            </button>
          </div>
          <div id="textAlignControls" class="hidden grid grid-cols-3 gap-1 bg-white p-0.5 rounded-lg border border-slate-200">
            <button onclick="window.updateSelectedStyle('textAlign', 'left')" id="align-left" class="align-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Left">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M3 4H12"></path><path d="M3 8H10"></path><path d="M3 12H12"></path>
              </svg>
            </button>
            <button onclick="window.updateSelectedStyle('textAlign', 'center')" id="align-center" class="align-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Center">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M2.5 4H13.5"></path><path d="M4 8H12"></path><path d="M2.5 12H13.5"></path>
              </svg>
            </button>
            <button onclick="window.updateSelectedStyle('textAlign', 'right')" id="align-right" class="align-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Right">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M4 4H13"></path><path d="M6 8H13"></path><path d="M4 12H13"></path>
              </svg>
            </button>
          </div>
          <div id="textVerticalControls" class="hidden grid grid-cols-3 gap-1 bg-white p-0.5 rounded-lg border border-slate-200">
            <button onclick="window.updateSelectedStyle('verticalAlign', 'top')" id="valign-top" class="valign-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Top">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M3 3H13"></path><path d="M5 6H11"></path><path d="M5 9H11"></path>
              </svg>
            </button>
            <button onclick="window.updateSelectedStyle('verticalAlign', 'center')" id="valign-center" class="valign-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Middle">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M5 5H11"></path><path d="M3 8H13"></path><path d="M5 11H11"></path>
              </svg>
            </button>
            <button onclick="window.updateSelectedStyle('verticalAlign', 'bottom')" id="valign-bottom" class="valign-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Align Bottom">
              <svg viewBox="0 0 16 16" class="align-icon" aria-hidden="true">
                <path d="M5 7H11"></path><path d="M5 10H11"></path><path d="M3 13H13"></path>
              </svg>
            </button>
          </div>
          <div id="textFormatControls" class="hidden grid grid-cols-2 gap-1 bg-white p-0.5 rounded-lg border border-slate-200">
            <button onclick="window.toggleSelectedTextStyle('fontWeight', '700', '400')" id="font-bold" class="text-format-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Bold">
              <i data-lucide="bold" class="w-4 h-4 text-slate-700"></i>
            </button>
            <button onclick="window.toggleSelectedTextStyle('fontStyle', 'italic', 'normal')" id="font-italic" class="text-format-btn px-2 py-1 rounded hover:bg-slate-50 transition-all" title="Italic">
              <i data-lucide="italic" class="w-4 h-4 text-slate-700"></i>
            </button>
          </div>
          <div id="textSizeControl" class="hidden flex items-center gap-1.5">
            <label class="text-[8px] font-bold text-slate-400 uppercase whitespace-nowrap">Size</label>
          <span id="textSizeVal" class="text-[9px] font-bold theme-accent-text w-8 text-center">12px</span>
            <input type="range" min="8" max="48" step="0.5" value="12" id="textSizeSlider" oninput="window.updateSelectedTextFontSize(this.value)" class="w-16 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <div id="weightControl" class="flex items-center gap-1.5">
            <label class="text-[8px] font-bold text-slate-400 uppercase whitespace-nowrap">Weight</label>
          <span id="weightVal" class="text-[9px] font-bold theme-accent-text w-8 text-center">1px</span>
            <input type="range" min="0.5" max="10" step="0.5" value="1" id="weightSlider" oninput="window.updateSelectedStyle('weight', this.value)" class="w-16 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <div class="flex items-center gap-1.5">
            <label class="text-[8px] font-bold text-slate-400 uppercase whitespace-nowrap">Opacity</label>
          <span id="opacityVal" class="text-[9px] font-bold theme-accent-text w-10 text-center">100%</span>
            <input type="range" min="5" max="100" step="5" value="100" id="opacitySlider" oninput="window.updateSelectedStyle('opacity', this.value)" class="w-16 h-1 bg-slate-200 appearance-none cursor-pointer">
          </div>
          <button onclick="window.deleteSelected()" class="p-2 theme-destructive hover:bg-rose-50 rounded-lg transition-colors" title="Delete Selected"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
        </div>
        <button onclick="window.undo()" id="undoBtn" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-30 transition-colors" disabled>
          <i data-lucide="undo" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Undo</span>
        </button>
        <button onclick="window.clearCanvas()" class="flex items-center gap-2 px-3 py-2 text-sm font-medium theme-destructive bg-white border border-rose-100 rounded-lg hover:bg-rose-50 transition-colors" title="Clear All"><i data-lucide="refresh-cw" class="w-4 h-4"></i><span class="hidden sm:inline">Reset</span></button>
        <div class="h-8 w-px bg-slate-200 mx-1"></div>
        <button onclick="window.downloadPDF()" class="px-5 py-2 text-sm font-bold text-white theme-accent theme-accent-hover rounded-lg shadow-md transition-all flex items-center gap-2">
          <i data-lucide="cooking-pot" class="w-4 h-4"></i>
          <span>Bake PDF</span>
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <!-- Toolbox Sidebar -->
      <aside class="w-16 border-r bg-white flex flex-col items-center py-6 gap-4 z-10 shadow-sm">
        <button onclick="window.setTool('select')" id="tool-select" class="tool-btn p-3 rounded-xl text-white theme-accent shadow-md transition-all" title="Select / Move / Edit"><i data-lucide="mouse-pointer-2" class="w-6 h-6"></i></button>
        <div class="w-8 h-px bg-slate-100 my-2"></div>
        <button onclick="window.setTool('line')" id="tool-line" class="tool-btn p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all" title="Line (Sel + H/V to Span)"><i data-lucide="minus" class="w-6 h-6"></i></button>
        <button onclick="window.setTool('rect')" id="tool-rect" class="tool-btn p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all" title="Box"><i data-lucide="square" class="w-6 h-6"></i></button>
        <button onclick="window.setTool('dot')" id="tool-dot" class="tool-btn p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all" title="Dot (Shift+Drag to Fill Area)"><i data-lucide="dot" class="w-6 h-6"></i></button>
        <button onclick="window.setTool('cross')" id="tool-cross" class="tool-btn p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all" title="Cross (Dbl Click, Shift+Drag to Fill Area)"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button onclick="window.setTool('label')" id="tool-label" class="tool-btn p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-all" title="Grid Text Box"><i data-lucide="type" class="w-6 h-6"></i></button>
      </aside>

      <section id="viewport" class="flex-1 overflow-auto bg-slate-200/50 flex flex-col items-center px-12 pt-[5px] pb-1 no-scrollbar relative">
        <div id="workspace" class="flex flex-row items-start gap-12 transition-all"></div>
      </section>
    </div>
  </div>

  <div id="qualityModal" class="modal-backdrop hidden">
    <div class="w-[440px] max-w-[92vw] bg-white border border-slate-200 rounded-2xl shadow-2xl p-5">
      <div class="flex items-start justify-between gap-4 mb-4">
        <div>
          <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Bake PDF</h2>
          <p class="text-xs text-slate-500 mt-1">Choose export quality and estimated file size.</p>
        </div>
        <button onclick="window.closeQualityModal()" class="p-2 text-slate-400 hover:text-slate-700 hover:bg-slate-100 rounded-lg" title="Close">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div id="qualityOptions" class="space-y-2"></div>
      <div class="flex items-center justify-end gap-2 mt-5">
        <button onclick="window.closeQualityModal()" class="px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</button>
          <button onclick="window.confirmQualityModal()" class="px-4 py-2 text-sm font-bold text-white theme-accent theme-accent-hover rounded-lg">Download</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var version = window.__PAGE_BAKER_VERSION__ || {};
      var appScript = document.createElement('script');
      appScript.src = './app.js' + (version.hash ? '?v=' + encodeURIComponent(version.hash) : '');
      document.body.appendChild(appScript);
    })();
  </script>
</body>
</html>
