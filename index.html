<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page-Baker | Notebook Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    #designStage { cursor: crosshair; touch-action: none; }
    .grid-layer { pointer-events: none; transition: opacity 0.2s ease; }
    
    /* Selection & Hover Styles */
    .element-hover { cursor: pointer; transition: stroke 0.2s; }
    .element-hover:hover { stroke: #6366f1; stroke-width: 2px; }
    .element-selected { stroke: #6366f1 !important; stroke-width: 2.5px !important; filter: drop-shadow(0 0 4px rgba(99, 102, 241, 0.4)); }
    
    /* Invisible Hit Area for easier selection - Placed ON TOP of visible element */
    .hit-target { cursor: pointer; fill: transparent; stroke: transparent; stroke-width: 16px; pointer-events: all; }
    
    .handle { cursor: move; fill: #6366f1; stroke: white; stroke-width: 1.5; transition: r 0.2s; pointer-events: all; }
    .handle:hover { r: 6; }
    
    .text-element { font-family: 'Helvetica', sans-serif; font-weight: bold; pointer-events: none; user-select: none; text-anchor: middle; dominant-baseline: middle; }
    
    /* Ruler Styles */
    .ruler { background: #fff; color: #94a3b8; font-family: monospace; font-size: 9px; font-weight: bold; pointer-events: none; border-color: #e2e8f0; }
    .ruler-tick { stroke: #cbd5e1; stroke-width: 1; }
    .ruler-label { fill: #94a3b8; }
    .ruler-center-marker { stroke: #6366f1; stroke-width: 1.5; }

    #rulerLayout { transform-origin: top center; transition: transform 0.2s ease-out; }
    
    input[type="range"] { accent-color: #6366f1; }
    
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    #marqueeBox { fill: rgba(99, 102, 241, 0.1); stroke: #6366f1; stroke-width: 1; stroke-dasharray: 4; pointer-events: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden font-sans">
  <div class="h-full flex flex-col" id="app">
    <header class="border-b bg-white px-6 py-3 shadow-sm flex items-center justify-between z-20">
      <div class="flex items-center gap-4">
        <div class="flex flex-col">
          <h1 class="text-xl font-bold tracking-tight text-indigo-900 leading-none">Page-Baker</h1>
          <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 text-center">Professional Studio</span>
        </div>
        
        <div class="h-8 w-px bg-slate-200 mx-2"></div>
        
        <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
          <button onclick="setPaper('letter')" id="btn-letter" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500">Letter</button>
          <button onclick="setPaper('legal')" id="btn-legal" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500">Legal</button>
          <button onclick="setPaper('a4')" id="btn-a4" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500">A4</button>
          <button onclick="setPaper('b5')" id="btn-b5" class="paper-btn px-3 py-1.5 text-xs font-bold rounded-md transition-all text-slate-500">Semi-B5</button>
        </div>

        <div class="flex items-center gap-2 ml-2">
          <span class="text-[10px] font-bold text-slate-400 uppercase">Grid:</span>
          <select id="gridSelect" onchange="updateGridSize(this.value)" class="text-xs font-bold bg-white border border-slate-200 rounded px-2 py-1 outline-none focus:ring-2 ring-indigo-100">
            <optgroup label="Notebook Presets">
              <option value="3mm">3mm (Task Management)</option>
              <option value="5mm">5mm (Std Grid / 10mm Major)</option>
              <option value="6mm">6mm (B-Ruled / Report Pad)</option>
              <option value="12mm">12mm (Kanji / Dash Quadrants)</option>
            </optgroup>
            <optgroup label="Imperial Standards">
              <option value="0.25" selected>1/4" Grid</option>
              <option value="0.281">College Ruled (9/32")</option>
              <option value="0.344">Wide Ruled (11/32")</option>
            </optgroup>
          </select>
        </div>

        <div class="flex items-center gap-3 border-l pl-3 border-slate-200">
          <div class="flex flex-col items-start gap-0.5">
            <div class="flex items-center gap-1">
              <span class="text-[8px] font-bold text-slate-400 uppercase leading-none">Opacity %</span>
              <input type="number" id="globalOpacityInput" min="0" max="100" value="100" onchange="updateGlobalOpacity(this.value)" class="w-7 text-[10px] font-bold text-indigo-600 bg-slate-50 rounded px-1 border-none focus:ring-1 ring-indigo-300 text-center">
            </div>
            <input type="range" id="globalOpacitySlider" min="0" max="100" step="1" value="100" oninput="updateGlobalOpacity(this.value)" class="w-20 h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
          </div>
          <button onclick="toggleGrid()" id="gridToggle" class="p-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors" title="Toggle Grid">
            <i data-lucide="grid" class="w-4 h-4"></i>
          </button>
          <button onclick="toggleRulers()" id="rulerToggle" class="p-2 text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors" title="Toggle Rulers">
            <i data-lucide="ruler" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <button onclick="undo()" id="undoBtn" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-30 transition-colors" disabled>
          <i data-lucide="undo" class="w-4 h-4"></i>
          <span>Undo</span>
        </button>
        <button onclick="clearCanvas()" class="flex items-center gap-2 px-3 py-2 text-sm font-medium text-rose-600 bg-white border border-rose-100 rounded-lg hover:bg-rose-50 transition-colors" title="Clear All">
          <i data-lucide="refresh-cw" class="w-4 h-4"></i>
          <span>Reset</span>
        </button>
        <button onclick="downloadPDF()" class="px-6 py-2 text-sm font-bold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 shadow-md transition-all flex items-center gap-2">
          <i data-lucide="file-down" class="w-4 h-4"></i>
          <span>Bake PDF</span>
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <aside class="w-16 border-r bg-white flex flex-col items-center py-6 gap-4 z-10 shadow-sm">
        <button onclick="setTool('select')" id="tool-select" class="tool-btn p-3 rounded-xl text-slate-400 active-tool" title="Select / Move / Edit"><i data-lucide="mouse-pointer-2" class="w-6 h-6"></i></button>
        <div class="w-8 h-px bg-slate-100 my-2"></div>
        <button onclick="setTool('line')" id="tool-line" class="tool-btn p-3 rounded-xl text-slate-400" title="Line"><i data-lucide="minus" class="w-6 h-6"></i></button>
        <button onclick="setTool('rect')" id="tool-rect" class="tool-btn p-3 rounded-xl text-slate-400" title="Box"><i data-lucide="square" class="w-6 h-6"></i></button>
        <button onclick="setTool('dot')" id="tool-dot" class="tool-btn p-3 rounded-xl text-slate-400" title="Dot (Shift+Drag to Fill Area)"><i data-lucide="dot" class="w-6 h-6"></i></button>
        <button onclick="setTool('cross')" id="tool-cross" class="tool-btn p-3 rounded-xl text-slate-400" title="Cross (Dbl Click, Shift+Drag to Fill Area)"><i data-lucide="plus" class="w-6 h-6"></i></button>
        <button onclick="setTool('label')" id="tool-label" class="tool-btn p-3 rounded-xl text-slate-400" title="Grid Text"><i data-lucide="type" class="w-6 h-6"></i></button>
      </aside>

      <section id="viewport" class="flex-1 overflow-auto bg-slate-200/50 flex flex-col items-center p-12 no-scrollbar relative">
        <div id="rulerLayout" class="relative flex flex-col shadow-[0_30px_60px_rgba(0,0,0,0.15)] bg-white border border-slate-200">
          <div class="flex">
            <div id="rulerCorner" class="w-8 h-8 bg-white border-b border-r border-slate-200 flex-shrink-0"></div>
            <svg id="rulerTop" class="ruler h-8 border-b border-slate-200 flex-grow"></svg>
          </div>
          <div class="flex">
            <svg id="rulerLeft" class="ruler w-8 border-r border-slate-200 flex-shrink-0"></svg>
            <div id="canvasWrapper" class="bg-white relative flex-shrink-0">
              <svg id="gridOverlay" class="absolute inset-0 grid-layer w-full h-full"></svg>
              <svg id="designStage" class="absolute inset-0 w-full h-full">
                <g id="elementsGroup"></g>
                <g id="handlesGroup"></g>
                <circle id="snapDot" r="3" fill="#6366f1" class="opacity-0 pointer-events-none" />
                <line id="tempLine" class="hidden" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4" />
                <rect id="tempRect" class="hidden" fill="rgba(99, 102, 241, 0.1)" stroke="#6366f1" stroke-width="1" stroke-dasharray="4" />
                <rect id="marqueeBox" class="hidden" />
              </svg>
            </div>
          </div>
        </div>

        <div id="propsPanel" class="hidden fixed top-24 right-8 bg-white border border-slate-200 p-5 rounded-2xl shadow-xl w-64 z-30">
          <div class="flex items-center justify-between mb-4 border-b pb-2">
            <span id="propsTitle" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Properties</span>
            <button onclick="deleteSelected()" class="text-rose-500 hover:bg-rose-50 p-1.5 rounded-lg transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </div>
          <div class="space-y-5">
            <div>
              <label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Pattern</label>
              <div class="grid grid-cols-4 gap-1 bg-slate-100 p-1 rounded-lg">
                <button onclick="updateSelectedStyle('dash', 'none')" id="style-none" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Solid</button>
                <button onclick="updateSelectedStyle('dash', '5,5')" id="style-dashed" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Dash</button>
                <button onclick="updateSelectedStyle('dash', '1,3')" id="style-dotted" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">Dot</button>
                <button onclick="updateSelectedStyle('dash', '8,4,1,4')" id="style-dashdot" class="style-btn px-1 py-1 text-[9px] font-bold rounded hover:bg-white transition-all">D-Dot</button>
              </div>
            </div>
            <div id="typeSpecificProps"></div>
            <div class="grid grid-cols-2 gap-4">
               <div>
                  <div class="flex items-center justify-between mb-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase">Weight</label>
                    <span id="weightVal" class="text-[10px] font-bold text-indigo-600">1px</span>
                  </div>
                  <input type="range" min="0.5" max="5" step="0.5" value="1" id="weightSlider" oninput="updateSelectedStyle('weight', this.value)" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
               </div>
               <div>
                  <div class="flex items-center justify-between mb-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase">Opacity</label>
                    <span id="opacityVal" class="text-[10px] font-bold text-indigo-600">100%</span>
                  </div>
                  <input type="range" min="10" max="100" step="10" value="100" id="opacitySlider" oninput="updateSelectedStyle('opacity', this.value)" class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer">
               </div>
            </div>
          </div>
        </div>

        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur border border-slate-200 px-3 py-2 rounded-2xl shadow-xl flex items-center gap-2 z-30">
           <button onclick="zoomOut()" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors"><i data-lucide="minus-circle" class="w-5 h-5"></i></button>
           <span id="zoomLabel" class="text-xs font-bold text-slate-500 w-12 text-center">100%</span>
           <button onclick="zoomIn()" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-600 transition-colors"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
           <div class="h-5 w-px bg-slate-200 mx-1"></div>
           <button onclick="fitAuto()" class="px-2 py-1 text-[10px] font-bold bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded transition-all uppercase tracking-tighter">Auto Fit</button>
        </div>

        <div class="fixed bottom-6 right-6 bg-white border border-slate-200 px-4 py-2 rounded-full shadow-lg text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-6 pointer-events-none z-30">
          <span id="coordDisplay">X: 0.00 Y: 0.00</span>
          <span id="countDisplay">0 Elements</span>
        </div>
      </section>
    </div>
  </div>

  <script>
    const PAPER_CONFIG = {
      letter: { width: 8.5, height: 11, unit: 'in' },
      legal: { width: 8.5, height: 14, unit: 'in' },
      a4: { width: 210, height: 297, unit: 'mm' },
      b5: { width: 179, height: 252, unit: 'mm' }
    };

    const PPI = 72; const PMM = 2.83465;

    let state = {
      paper: 'letter', gridSize: 18, unit: 'in', tool: 'select', 
      elements: [], history: [], zoom: 1.0, globalOpacity: 100,
      isDrawing: false, isDragging: false, isModifying: false, isFilling: false, isSelecting: false,
      activeKeys: {}, clipboard: [],
      startPoint: null, dragElementIndex: null, selectedIndices: [], modifyHandleType: null,
      gridVisible: true, rulerVisible: true, gridOffset: { x: 0, y: 0 },
      gridType: 'standard', currentGridMode: 'in'
    };

    const canvasWrapper = document.getElementById('canvasWrapper');
    const gridOverlay = document.getElementById('gridOverlay');
    const designStage = document.getElementById('designStage');
    const elementsGroup = document.getElementById('elementsGroup');
    const handlesGroup = document.getElementById('handlesGroup');
    const tempLine = document.getElementById('tempLine');
    const tempRect = document.getElementById('tempRect');
    const marqueeBox = document.getElementById('marqueeBox');
    const snapDot = document.getElementById('snapDot');
    const coordDisplay = document.getElementById('coordDisplay');
    const countDisplay = document.getElementById('countDisplay');
    const undoBtn = document.getElementById('undoBtn');
    const rulerTop = document.getElementById('rulerTop');
    const rulerLeft = document.getElementById('rulerLeft');
    const propsPanel = document.getElementById('propsPanel');
    const propsTitle = document.getElementById('propsTitle');
    const rulerLayout = document.getElementById('rulerLayout');
    const viewport = document.getElementById('viewport');
    const typeSpecificProps = document.getElementById('typeSpecificProps');

    function init() {
      lucide.createIcons();
      setPaper('letter');
      setupEventListeners();
      updateGridSize('0.25');
      setTimeout(fitAuto, 300);
    }

    function setPaper(type) {
      if (state.elements.length > 0) saveHistory();
      state.paper = type; state.unit = PAPER_CONFIG[type].unit;
      const config = PAPER_CONFIG[type];
      const w = state.unit === 'in' ? config.width * PPI : config.width * PMM;
      const h = state.unit === 'in' ? config.height * PPI : config.height * PMM;
      canvasWrapper.style.width = `${w}px`; canvasWrapper.style.height = `${h}px`;
      rulerTop.style.width = `${w}px`; rulerLeft.style.height = `${h}px`;
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.toggle('bg-indigo-600', b.id === `btn-${type}`));
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.toggle('text-white', b.id === `btn-${type}`));
      document.querySelectorAll('.paper-btn').forEach(b => b.classList.toggle('text-slate-500', b.id !== `btn-${type}`));
      renderGrid(); renderElements();
    }

    function updateZoom(newZoom) {
      state.zoom = Math.max(0.1, Math.min(3, newZoom));
      rulerLayout.style.transform = `scale(${state.zoom})`;
      document.getElementById('zoomLabel').innerText = `${Math.round(state.zoom * 100)}%`;
    }

    function zoomIn() { updateZoom(state.zoom + 0.1); }
    function zoomOut() { updateZoom(state.zoom - 0.1); }
    function fitAuto() {
      const avW = viewport.clientWidth - 100, avH = viewport.clientHeight - 100;
      const paW = parseFloat(canvasWrapper.style.width) + 32, paH = parseFloat(canvasWrapper.style.height) + 32;
      updateZoom(Math.min(avW / paW, avH / paH));
    }

    function updateGridSize(val) {
      state.gridType = val === '12mm' ? 'kanji' : (val === '5mm' || val === '3mm' ? 'major' : 'standard');
      state.gridSize = val.endsWith('mm') ? parseFloat(val) * PMM : parseFloat(val) * PPI;
      renderGrid();
    }

    function toggleGrid() { state.gridVisible = !state.gridVisible; gridOverlay.style.opacity = state.gridVisible ? "1" : "0"; }
    function toggleRulers() { state.rulerVisible = !state.rulerVisible; document.querySelectorAll('.ruler, #rulerCorner').forEach(el => el.classList.toggle('hidden', !state.rulerVisible)); }

    function updateGlobalOpacity(val) { 
      const num = Math.max(0, Math.min(100, parseInt(val) || 0));
      state.globalOpacity = num; 
      document.getElementById('globalOpacitySlider').value = num;
      document.getElementById('globalOpacityInput').value = num;
      renderElements(); 
    }

    function renderGrid() {
      gridOverlay.innerHTML = '';
      const w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height), step = state.gridSize;
      state.gridOffset = { x: (w / 2) % step, y: (h / 2) % step };
      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      for (let x = state.gridOffset.x; x <= w + 0.1; x += step) g.appendChild(createGridLine(x, 0, x, h, x, null));
      for (let y = state.gridOffset.y; y <= h + 0.1; y += step) g.appendChild(createGridLine(0, y, w, y, null, y));
      gridOverlay.appendChild(g);
      renderRulers(w, h);
    }

    function createGridLine(x1, y1, x2, y2, xVal, yVal) {
      const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
      l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
      const w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height);
      let isMajor = (xVal !== null && Math.abs(xVal - w/2) < 0.1) || (yVal !== null && Math.abs(yVal - h/2) < 0.1);
      if (!isMajor && state.gridType === 'major') {
          const count = xVal !== null ? Math.round((xVal - state.gridOffset.x)/state.gridSize) : Math.round((yVal - state.gridOffset.y)/state.gridSize);
          if (count % (state.gridSize < 10 ? 5 : 2) === 0) isMajor = true;
      }
      l.setAttribute("stroke", isMajor ? "#cbd5e1" : "#f1f5f9");
      l.setAttribute("stroke-width", isMajor ? "1.2" : "1");
      return l;
    }

    function renderRulers(w, h) {
      rulerTop.innerHTML = ''; rulerLeft.innerHTML = '';
      const unitScale = state.unit === 'in' ? PPI : PMM, cx = w/2, cy = h/2;
      if (state.unit === 'mm') {
        for (let x = 0; x <= w + 0.1; x += unitScale) {
          const rel = Math.round((x - cx) / unitScale);
          if (rel % 5 === 0) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x); line.setAttribute("x2", x); line.setAttribute("y1", rel % 10 === 0 ? 15 : 22); line.setAttribute("y2", 32);
            line.setAttribute("class", Math.abs(rel) < 0.1 ? "ruler-center-marker" : "ruler-tick"); rulerTop.appendChild(line);
            if (rel % 10 === 0) { const t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", x+2); t.setAttribute("y", 12); t.setAttribute("class", "ruler-label"); t.textContent = Math.round(rel/10); rulerTop.appendChild(t); }
          }
        }
        for (let y = 0; y <= h + 0.1; y += unitScale) {
          const rel = Math.round((y - cy) / unitScale);
          if (rel % 5 === 0) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("y1", y); line.setAttribute("y2", y); line.setAttribute("x1", rel % 10 === 0 ? 15 : 22); line.setAttribute("x2", 32);
            line.setAttribute("class", Math.abs(rel) < 0.1 ? "ruler-center-marker" : "ruler-tick"); rulerLeft.appendChild(line);
            if (rel % 10 === 0) { const t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", 2); t.setAttribute("y", y+3); t.setAttribute("class", "ruler-label"); t.textContent = Math.round(rel/10); rulerLeft.appendChild(t); }
          }
        }
      } else {
        const step = 0.25 * unitScale;
        for (let x = 0; x <= w + 0.1; x += step) {
          const rel = Math.round((x - cx) / unitScale * 100) / 100;
          const isW = Math.abs(rel % 1) < 0.01;
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", x); line.setAttribute("x2", x); line.setAttribute("y1", isW ? 15 : 22); line.setAttribute("y2", 32);
          line.setAttribute("class", Math.abs(rel) < 0.01 ? "ruler-center-marker" : "ruler-tick"); rulerTop.appendChild(line);
          if (isW) { const t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", x+2); t.setAttribute("y", 12); t.setAttribute("class", "ruler-label"); t.textContent = Math.round(rel); rulerTop.appendChild(t); }
        }
        for (let y = 0; y <= h + 0.1; y += step) {
          const rel = Math.round((y - cy) / unitScale * 100) / 100;
          const isW = Math.abs(rel % 1) < 0.01;
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("y1", y); line.setAttribute("y2", y); line.setAttribute("x1", isW ? 15 : 22); line.setAttribute("x2", 32);
          line.setAttribute("class", Math.abs(rel) < 0.01 ? "ruler-center-marker" : "ruler-tick"); rulerLeft.appendChild(line);
          if (isW) { const t = document.createElementNS("http://www.w3.org/2000/svg", "text"); t.setAttribute("x", 2); t.setAttribute("y", y+3); t.setAttribute("class", "ruler-label"); t.textContent = Math.round(rel); rulerLeft.appendChild(t); }
        }
      }
    }

    function setTool(tool) {
      state.tool = tool; state.selectedIndices = [];
      propsPanel.classList.add('hidden');
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('bg-indigo-50', b.id === `tool-${tool}`));
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('text-indigo-600', b.id === `tool-${tool}`));
      renderElements();
    }

    function getSnappedCoords(e) {
      const rect = designStage.getBoundingClientRect();
      const rawX = (e.clientX - rect.left) / state.zoom, rawY = (e.clientY - rect.top) / state.zoom;
      const step = state.gridSize;
      const fx = Math.round((rawX - state.gridOffset.x) / step) * step + state.gridOffset.x;
      const fy = Math.round((rawY - state.gridOffset.y) / step) * step + state.gridOffset.y;
      const w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height), us = state.unit === 'in' ? PPI : PMM;
      coordDisplay.innerText = `X: ${((fx - w/2) / us).toFixed(2)} Y: ${((fy - h/2) / us).toFixed(2)}`;
      if (state.tool !== 'select') { snapDot.setAttribute('cx', fx); snapDot.setAttribute('cy', fy); snapDot.classList.remove('opacity-0'); }
      return { x: fx, y: fy };
    }

    function setupEventListeners() {
      window.addEventListener('keydown', e => { 
        state.activeKeys[e.key.toLowerCase()] = true;
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') {
            if (state.selectedIndices.length > 0) state.clipboard = state.selectedIndices.map(idx => JSON.parse(JSON.stringify(state.elements[idx])));
        }
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') {
            if (state.clipboard.length > 0) {
                e.preventDefault(); saveHistory();
                const step = state.gridSize;
                const newSelection = [];
                state.clipboard.forEach(orig => {
                    const n = JSON.parse(JSON.stringify(orig));
                    if (n.type === 'line') { n.x1 += step; n.y1 += step; n.x2 += step; n.y2 += step; } else { n.x += step; n.y += step; }
                    state.elements.push(n); newSelection.push(state.elements.length - 1);
                });
                state.selectedIndices = newSelection; renderElements(); updatePropsPanel();
            }
        }
        if (state.selectedIndices.length > 0) {
            if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteSelected(); return; }
            const step = state.gridSize; let dx = 0, dy = 0;
            if (e.key === 'ArrowUp') dy = -step; if (e.key === 'ArrowDown') dy = step;
            if (e.key === 'ArrowLeft') dx = -step; if (e.key === 'ArrowRight') dx = step;
            if (dx !== 0 || dy !== 0) { 
              e.preventDefault(); saveHistory(); 
              state.selectedIndices.forEach(idx => {
                const el = state.elements[idx];
                if (el.type === 'line') { el.x1 += dx; el.y1 += dy; el.x2 += dx; el.y2 += dy; } else { el.x += dx; el.y += dy; }
              });
              renderElements();
            }
        }
      });
      window.addEventListener('keyup', e => state.activeKeys[e.key.toLowerCase()] = false);

      designStage.addEventListener('mousedown', e => {
        const c = getSnappedCoords(e);
        if (state.tool === 'select') {
          if (e.target === designStage) { 
            state.selectedIndices = []; state.isSelecting = true;
            state.startPoint = { x: (e.clientX - designStage.getBoundingClientRect().left) / state.zoom, y: (e.clientY - designStage.getBoundingClientRect().top) / state.zoom };
            marqueeBox.setAttribute('x', state.startPoint.x); marqueeBox.setAttribute('y', state.startPoint.y);
            marqueeBox.setAttribute('width', 0); marqueeBox.setAttribute('height', 0);
            marqueeBox.classList.remove('hidden'); propsPanel.classList.add('hidden'); renderElements(); 
          }
          return;
        };
        if (e.shiftKey && (state.tool === 'dot' || state.tool === 'cross')) {
            state.isFilling = true; state.startPoint = c;
            tempRect.setAttribute('x', c.x); tempRect.setAttribute('y', c.y); tempRect.classList.remove('hidden'); return;
        }
        state.isDrawing = true; state.startPoint = c;
        if (state.tool === 'line') { tempLine.setAttribute('x1', c.x); tempLine.setAttribute('y1', c.y); tempLine.classList.remove('hidden'); }
        if (state.tool === 'rect') { tempRect.setAttribute('x', c.x); tempRect.setAttribute('y', c.y); tempRect.classList.remove('hidden'); }
      });

      window.addEventListener('mousemove', e => {
        const rect = designStage.getBoundingClientRect();
        const curX = (e.clientX - rect.left) / state.zoom, curY = (e.clientY - rect.top) / state.zoom;
        const c = getSnappedCoords(e);
        if (state.isSelecting) {
            const x = Math.min(curX, state.startPoint.x), y = Math.min(curY, state.startPoint.y);
            const w = Math.abs(curX - state.startPoint.x), h = Math.abs(curY - state.startPoint.y);
            marqueeBox.setAttribute('x', x); marqueeBox.setAttribute('y', y);
            marqueeBox.setAttribute('width', w); marqueeBox.setAttribute('height', h);
            const currentSelection = [];
            state.elements.forEach((el, idx) => { if (isInside(el, x, y, w, h)) currentSelection.push(idx); });
            state.selectedIndices = currentSelection; renderElements(); return;
        }
        if (state.isFilling) {
            const x = Math.min(c.x, state.startPoint.x), y = Math.min(c.y, state.startPoint.y);
            const w = Math.abs(c.x - state.startPoint.x), h = Math.abs(c.y - state.startPoint.y);
            tempRect.setAttribute('x', x); tempRect.setAttribute('y', y);
            tempRect.setAttribute('width', w); tempRect.setAttribute('height', h); return;
        }
        if (state.isModifying && state.selectedIndices.length === 1) {
          const el = state.elements[state.selectedIndices[0]];
          if (state.modifyHandleType === 'start') { el.x1 = c.x; el.y1 = c.y; }
          else if (state.modifyHandleType === 'end') { el.x2 = c.x; el.y2 = c.y; }
          else if (state.modifyHandleType === 'tl') { el.x = c.x; el.y = c.y; el.w = Math.max(state.gridSize, el.w + (el.x - c.x)); el.h = Math.max(state.gridSize, el.h + (el.y - c.y)); }
          else if (state.modifyHandleType === 'br') { el.w = Math.max(state.gridSize, c.x - el.x); el.h = Math.max(state.gridSize, c.y - el.y); }
          else if (state.modifyHandleType === 'center') { el.x = c.x; el.y = c.y; }
          renderElements(); return;
        }
        if (state.isDragging && state.selectedIndices.length > 0) {
          const dx = c.x - state.startPoint.x; const dy = c.y - state.startPoint.y;
          if (dx === 0 && dy === 0) return;
          state.selectedIndices.forEach(idx => {
            const el = state.elements[idx];
            if (el.type === 'line') { el.x1 += dx; el.y1 += dy; el.x2 += dx; el.y2 += dy; } else { el.x += dx; el.y += dy; }
          });
          state.startPoint = c; renderElements(); return;
        }
        if (!state.isDrawing) return;
        if (state.tool === 'line') { tempLine.setAttribute('x2', c.x); tempLine.setAttribute('y2', c.y); }
        if (state.tool === 'rect') {
          tempRect.setAttribute('x', Math.min(c.x, state.startPoint.x)); tempRect.setAttribute('y', Math.min(c.y, state.startPoint.y));
          tempRect.setAttribute('width', Math.abs(c.x - state.startPoint.x)); tempRect.setAttribute('height', Math.abs(c.y - state.startPoint.y));
        }
      });

      window.addEventListener('mouseup', (e) => {
        if (state.isSelecting) { state.isSelecting = false; marqueeBox.classList.add('hidden'); if (state.selectedIndices.length > 0) updatePropsPanel(); return; }
        if (state.isFilling) {
            state.isFilling = false; tempRect.classList.add('hidden');
            const c = getSnappedCoords(e), xMin = Math.min(c.x, state.startPoint.x), xMax = Math.max(c.x, state.startPoint.x);
            const yMin = Math.min(c.y, state.startPoint.y), yMax = Math.max(c.y, state.startPoint.y), step = state.gridSize, w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height);
            let added = false; saveHistory();
            for (let gx = state.gridOffset.x; gx <= w + 0.1; gx += step) {
              for (let gy = state.gridOffset.y; gy <= h + 0.1; gy += step) {
                if (gx > xMin + 0.1 && gx < xMax - 0.1 && gy > yMin + 0.1 && gy < yMax - 0.1) {
                  state.elements.push({ type: state.tool, x: gx, y: gy, style: { dash: 'none', opacity: 100, weight: 1, crossSize: 6 } });
                  added = true;
                }
              }
            }
            if (added) renderElements(); else state.history.pop(); return;
        }
        state.isDragging = false; state.isModifying = false; if (!state.isDrawing) return; state.isDrawing = false;
        const c = getSnappedCoords(e); let el = null; const style = { dash: 'none', opacity: 100, weight: 1, crossSize: 6, textAlign: 'on' };
        if (state.tool === 'line') { tempLine.classList.add('hidden'); el = { type: 'line', x1: state.startPoint.x, y1: state.startPoint.y, x2: c.x, y2: c.y, style }; }
        if (state.tool === 'rect') { tempRect.classList.add('hidden'); el = { type: 'rect', x: Math.min(c.x, state.startPoint.x), y: Math.min(c.y, state.startPoint.y), w: Math.abs(c.x - state.startPoint.x), h: Math.abs(c.y - state.startPoint.y), style }; }
        if (state.tool === 'dot') el = { type: 'dot', x: c.x, y: c.y, style };
        if (state.tool === 'label') { const t = prompt("Text:", "Date:"); if (t) el = { type: 'label', x: c.x, y: c.y, text: t, style }; }
        if (el) { saveHistory(); state.elements.push(el); renderElements(); }
      });

      designStage.addEventListener('dblclick', e => {
        const c = getSnappedCoords(e), w = parseFloat(canvasWrapper.style.width), h = parseFloat(canvasWrapper.style.height);
        const style = { dash: 'none', opacity: 100, weight: 1, crossSize: 6, textAlign: 'on' };
        if (state.tool === 'cross') { saveHistory(); state.elements.push({ type: 'cross', x: c.x, y: c.y, style }); renderElements(); return; }
        if (state.activeKeys['h']) { saveHistory(); state.elements.push({ type: 'line', x1: 0, y1: c.y, x2: w, y2: c.y, style }); renderElements(); }
        else if (state.activeKeys['v']) { saveHistory(); state.elements.push({ type: 'line', x1: c.x, y1: 0, x2: c.x, y2: h, style }); renderElements(); }
      });
    }

    function isInside(el, x, y, w, h) {
        if (el.type === 'line') return (el.x1 >= x && el.x1 <= x + w && el.y1 >= y && el.y1 <= y + h) && (el.x2 >= x && el.x2 <= x + w && el.y2 >= y && el.y2 <= y + h);
        if (el.type === 'rect') return (el.x >= x && el.x + el.w <= x + w && el.y >= y && el.y + el.h <= y + h);
        return (el.x >= x && el.x <= x + w && el.y >= y && el.y <= y + h);
    }

    function createHandle(x, y, type) {
      const h = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      h.setAttribute("cx", x); h.setAttribute("cy", y); h.setAttribute("r", 4.5); h.setAttribute("class", "handle");
      h.addEventListener('mousedown', e => { e.stopPropagation(); saveHistory(); state.isModifying = true; state.modifyHandleType = type; });
      return h;
    }

    function renderElements() {
      elementsGroup.innerHTML = ''; handlesGroup.innerHTML = '';
      const mOp = state.globalOpacity / 100;
      state.elements.forEach((el, i) => {
        const isS = state.selectedIndices.includes(i), elOp = (el.style?.opacity || 100) / 100, dash = el.style?.dash === 'none' ? '' : el.style?.dash, weight = el.style?.weight || 1, fOp = elOp * mOp;
        
        let node;
        if (el.type === 'line') { node = document.createElementNS("http://www.w3.org/2000/svg", "line"); node.setAttribute("x1", el.x1); node.setAttribute("y1", el.y1); node.setAttribute("x2", el.x2); node.setAttribute("y2", el.y2); }
        else if (el.type === 'rect') { node = document.createElementNS("http://www.w3.org/2000/svg", "rect"); node.setAttribute("x", el.x); node.setAttribute("y", el.y); node.setAttribute("width", el.w); node.setAttribute("height", el.h); node.setAttribute("fill", "none"); }
        else if (el.type === 'dot') { node = document.createElementNS("http://www.w3.org/2000/svg", "circle"); node.setAttribute("cx", el.x); node.setAttribute("cy", el.y); node.setAttribute("r", 1.5); }
        else if (el.type === 'cross') {
          const s = el.style.crossSize || 6; node = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const hL = document.createElementNS("http://www.w3.org/2000/svg", "line"); hL.setAttribute("x1", el.x-s/2); hL.setAttribute("x2", el.x+s/2); hL.setAttribute("y1", el.y); hL.setAttribute("y2", el.y);
          const vL = document.createElementNS("http://www.w3.org/2000/svg", "line"); vL.setAttribute("y1", el.y-s/2); vL.setAttribute("y2", el.y+s/2); vL.setAttribute("x1", el.x); vL.setAttribute("x2", el.x);
          node.appendChild(hL); node.appendChild(vL);
        } else if (el.type === 'label') {
          node = document.createElementNS("http://www.w3.org/2000/svg", "text");
          const yOff = el.style.textAlign === 'on' ? 0 : state.gridSize / 2;
          node.setAttribute("x", el.x); node.setAttribute("y", el.y + yOff);
          node.setAttribute("font-size", 12); node.textContent = el.text; node.setAttribute("class", "text-element");
          if (el.style.textAlign === 'on') node.setAttribute("dominant-baseline", "alphabetic");
        }
        
        if (node) {
          const color = "#334155";
          node.setAttribute("stroke", el.type === 'dot' || el.type === 'label' ? "none" : color);
          node.setAttribute("fill", el.type === 'dot' || el.type === 'label' ? color : "none");
          if (el.type !== 'dot' && el.type !== 'label') node.setAttribute("stroke-width", weight);
          if (dash) node.setAttribute("stroke-dasharray", dash);
          node.setAttribute("opacity", fOp); node.classList.add('element-hover'); if (isS) node.classList.add('element-selected');
          elementsGroup.appendChild(node);
          
          const hit = document.createElementNS("http://www.w3.org/2000/svg", el.type === 'line' ? 'line' : (el.type === 'rect' ? 'rect' : 'circle'));
          hit.setAttribute("class", "hit-target");
          if (el.type === 'line') { hit.setAttribute("x1", el.x1); hit.setAttribute("y1", el.y1); hit.setAttribute("x2", el.x2); hit.setAttribute("y2", el.y2); }
          else if (el.type === 'rect') { hit.setAttribute("x", el.x); hit.setAttribute("y", el.y); hit.setAttribute("width", el.w); hit.setAttribute("height", el.h); }
          else { hit.setAttribute("cx", el.x); hit.setAttribute("cy", el.y); hit.setAttribute("r", 10); }
          
          hit.addEventListener('mousedown', e => { 
            if (state.tool !== 'select') return;
            e.stopPropagation(); 
            if (!state.selectedIndices.includes(i)) {
                if (!e.shiftKey) state.selectedIndices = [i];
                else state.selectedIndices.push(i);
                saveHistory();
            }
            state.isDragging = true; state.dragElementIndex = i; state.startPoint = getSnappedCoords(e); 
            updatePropsPanel(); renderElements(); 
          });
          elementsGroup.appendChild(hit);

          if (isS && state.selectedIndices.length === 1) {
            if (el.type === 'line') { handlesGroup.appendChild(createHandle(el.x1, el.y1, 'start')); handlesGroup.appendChild(createHandle(el.x2, el.y2, 'end')); }
            else if (el.type === 'rect') { handlesGroup.appendChild(createHandle(el.x, el.y, 'tl')); handlesGroup.appendChild(createHandle(el.x + el.w, el.y + el.h, 'br')); }
            else { handlesGroup.appendChild(createHandle(el.x, el.y, 'center')); }
          }
        }
      });
      countDisplay.innerText = `${state.elements.length} Elements`; undoBtn.disabled = state.history.length === 0;
    }

    function updatePropsPanel() {
      if (state.selectedIndices.length === 0) { propsPanel.classList.add('hidden'); return; }
      const el = state.elements[state.selectedIndices[0]]; propsPanel.classList.remove('hidden');
      propsTitle.innerText = state.selectedIndices.length > 1 ? `Properties (${state.selectedIndices.length})` : "Properties";
      document.getElementById('opacityVal').innerText = `${el.style.opacity}%`;
      document.getElementById('opacitySlider').value = el.style.opacity;
      document.getElementById('weightVal').innerText = `${el.style.weight}px`;
      document.getElementById('weightSlider').value = el.style.weight;
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-indigo-600'));
      const dm = {'none':'style-none', '5,5':'style-dashed', '1,3':'style-dotted', '8,4,1,4':'style-dashdot'};
      if (dm[el.style.dash]) document.getElementById(dm[el.style.dash]).classList.add('bg-white', 'shadow-sm', 'text-indigo-600');
      typeSpecificProps.innerHTML = '';
      if (state.selectedIndices.length === 1) {
        if (el.type === 'cross') {
          typeSpecificProps.innerHTML = `<label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Cross Size</label><div class="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg"><button onclick="updateSelectedStyle('crossSize', 4)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==4?'bg-white shadow-sm text-indigo-600':''}">Small</button><button onclick="updateSelectedStyle('crossSize', 8)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==8?'bg-white shadow-sm text-indigo-600':''}">Med</button><button onclick="updateSelectedStyle('crossSize', 14)" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.crossSize==14?'bg-white shadow-sm text-indigo-600':''}">Large</button></div>`;
        } else if (el.type === 'label') {
          typeSpecificProps.innerHTML = `<label class="text-[9px] font-bold text-slate-400 uppercase block mb-2">Alignment</label><div class="grid grid-cols-2 gap-1 bg-slate-100 p-1 rounded-lg"><button onclick="updateSelectedStyle('textAlign', 'on')" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.textAlign=='on'?'bg-white shadow-sm text-indigo-600':''}">On Line</button><button onclick="updateSelectedStyle('textAlign', 'between')" class="px-1 py-1 text-[9px] font-bold rounded ${el.style.textAlign=='between'?'bg-white shadow-sm text-indigo-600':''}">Between</button></div>`;
        }
      }
    }

    function updateSelectedStyle(prop, val) {
      if (state.selectedIndices.length === 0) return;
      state.selectedIndices.forEach(idx => state.elements[idx].style[prop] = val);
      if (prop === 'opacity') document.getElementById('opacityVal').innerText = `${val}%`;
      if (prop === 'weight') document.getElementById('weightVal').innerText = `${val}px`;
      renderElements(); updatePropsPanel();
    }

    function deleteSelected() { if (state.selectedIndices.length === 0) return; saveHistory(); state.elements = state.elements.filter((_, i) => !state.selectedIndices.includes(i)); state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); }
    function clearCanvas() { if (confirm('Reset?')) { saveHistory(); state.elements = []; state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); } }
    function saveHistory() { state.history.push(JSON.stringify(state.elements)); if (state.history.length > 50) state.history.shift(); }
    function undo() { if (state.history.length) { state.elements = JSON.parse(state.history.pop()); state.selectedIndices = []; propsPanel.classList.add('hidden'); renderElements(); } }

    async function downloadPDF() {
      const { jsPDF } = window.jspdf; const conf = PAPER_CONFIG[state.paper];
      const pdf = new jsPDF({ orientation: conf.width > conf.height ? 'l' : 'p', unit: state.unit, format: state.paper });
      const scale = state.unit === 'in' ? PPI : PMM, globalOp = state.globalOpacity / 100;
      state.elements.forEach(el => {
        const elOp = (el.style?.opacity || 100) / 100;
        const finalOp = elOp * globalOp;
        pdf.setGState(new pdf.GState({ opacity: finalOp, strokeOpacity: finalOp }));
        pdf.setDrawColor(60, 60, 70); pdf.setLineWidth((el.style?.weight || 1) / scale);
        if (el.style?.dash !== 'none') {
           const d = {'5,5':[5,5], '1,3':[1,3], '8,4,1,4':[8,4,1,4]}[el.style.dash];
           pdf.setLineDashPattern(d.map(v => v/scale), 0);
        } else pdf.setLineDashPattern([], 0);
        if (el.type === 'line') pdf.line(el.x1/scale, el.y1/scale, el.x2/scale, el.y2/scale);
        if (el.type === 'rect') pdf.rect(el.x/scale, el.y/scale, el.w/scale, el.h/scale);
        if (el.type === 'dot') { pdf.setFillColor(60,60,70); pdf.circle(el.x/scale, el.y/scale, 1.5/scale, 'F'); }
        if (el.type === 'cross') { const s = el.style.crossSize || 6; pdf.line((el.x-s/2)/scale, el.y/scale, (el.x+s/2)/scale, el.y/scale); pdf.line(el.x/scale, (el.y-s/2)/scale, el.x/scale, (el.y+s/2)/scale); }
        if (el.type === 'label') { 
          pdf.setFont("helvetica", "bold"); pdf.setFontSize(9);
          pdf.text(el.text, el.x/scale, (el.y + (el.style.textAlign === 'on' ? 0 : state.gridSize / 2))/scale, { align: 'center', baseline: el.style.textAlign === 'on' ? 'bottom' : 'middle' });
        }
      });
      pdf.save(`baked-notebook.pdf`);
    }

    init();
  </script>
</body>
</html>
